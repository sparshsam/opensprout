name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

env:
  NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
  NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-placeholder-publishable-key

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=critical

      - name: Lint
        run: npm run lint

      - name: Typecheck (web)
        run: npm run typecheck

      - name: Typecheck (mcp)
        run: npm --workspace apps/mcp run typecheck

      - name: Build (mcp)
        run: npm --workspace apps/mcp run build

      - name: Build (web)
        run: npm run build

      - name: Test (mcp)
        run: npm --workspace apps/mcp test

  android:
    # Android build runs on all events so branch protection always sees this check.
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build MCP
        run: npm --workspace @opensprout/mcp run build

      - name: Build web
        run: npx next build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}

      - name: Prepare static output for Capacitor
        run: |
          mkdir -p out/_next
          # Copy static assets
          cp -r .next/static out/_next/ 2>/dev/null || true
          # Copy page HTML files from server build
          for f in .next/server/app/*/index.html; do
            [ -f "$f" ] || continue
            dir="$(basename "$(dirname "$f")")"
            mkdir -p "out/$dir"
            cp "$f" "out/$dir/index.html"
          done
          # Root page
          [ -f .next/server/app/index.html ] && cp .next/server/app/index.html out/
          # Fallback index
          if [ ! -f out/index.html ]; then
            echo '<!DOCTYPE html><html><head><script>location.href="/today";</script></head><body>Loading OpenSprout...</body></html>' > out/index.html
          fi
        working-directory: apps/web

      - name: Sync Capacitor
        run: npx cap sync android
        working-directory: apps/web

      - name: Build Android (debug)
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug
        working-directory: apps/web

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: opensprout-debug-apk
          path: apps/web/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
