name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-placeholder-publishable-key

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=critical

      - name: Lint
        run: npm run lint

      - name: Typecheck (web)
        run: npm run typecheck

      - name: Typecheck (mcp)
        run: npm --workspace apps/mcp run typecheck

      - name: Build (web)
        run: npm run build

      - name: Build (mcp)
        run: npm --workspace apps/mcp run build

      - name: Test (mcp)
        run: npm --workspace apps/mcp test
